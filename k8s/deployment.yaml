apiVersion: apps/v1
kind: Deployment
metadata:
  name: "internettoday"
  namespace: "agents-dev"
  labels:
    app: "internettoday"
    team: "dev"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "internettoday"
  template:
    metadata:
      labels:
        app: "internettoday"
        team: "dev"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-internettoday"
      containers:
        - name: "internettoday"
          image: "acrshoppoc.azurecr.io/agents/internettoday:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-internettoday"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
